<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Heatmap Seat</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    canvas {
      margin-top: 30px;
      border-radius: 20px;
      background: #222;
    }
  </style>
</head>

<body>

<h1>🔥 壓力熱力圖</h1>
<canvas id="heatmap" width="300" height="300"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDItFT-vVfJ4lKKRbF-WijBkQ4UrNdnCkI",
    authDomain: "pressure-seat.firebaseapp.com",
    databaseURL: "https://pressure-seat-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pressure-seat",
    storageBucket: "pressure-seat.firebasestorage.app",
    messagingSenderId: "602813431828",
    appId: "1:602813431828:web:e2199a92f3c09a66d96701"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();
  const seatRef = db.ref("seat");

  const canvas = document.getElementById("heatmap");
  const ctx = canvas.getContext("2d");

  function getColor(value) {
    let ratio = value / 1000;

    let r = Math.floor(255 * ratio);
    let g = Math.floor(255 * (1 - Math.abs(ratio - 0.5) * 2));
    let b = Math.floor(255 * (1 - ratio));

    return `rgb(${r}, ${g}, ${b})`;
  }

  function drawHeatmap(data) {
    ctx.clearRect(0, 0, 300, 300);

    const positions = [
      [50, 50], [150, 50], [250, 50],
      [50, 200], [150, 200], [250, 200]
    ];

    for (let i = 0; i < 6; i++) {
      let val = data[`sensor${i+1}`] || 0;

      let [x, y] = positions[i];

      let gradient = ctx.createRadialGradient(x, y, 10, x, y, 80);
      gradient.addColorStop(0, getColor(val));
      gradient.addColorStop(1, "transparent");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, 80, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  seatRef.on("value", (snapshot) => {
    const data = snapshot.val();
    if (data) {
      drawHeatmap(data);
    }
  });
</script>

</body>
</html>
